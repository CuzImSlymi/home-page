<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Slymi's Portfolio - Versatile developer showcasing projects and skills in web development, AI, and game design.">
    <meta name="keywords" content="Slymi, developer, portfolio, web development, AI, game design">
    <title>Slymi</title>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2ecc71;
            --text-color: #ecf0f1;
            --background-color: rgba(0, 0, 0, 0.7);
        }

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Playfair+Display:wght@700&display=swap');
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            color: var(--text-color);
            overflow: hidden;
            height: 100%;
            background-color: var(--background-color);
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
        }

        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            filter: brightness(70%);
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: fadeInUp 1s ease-out;
        }

        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
        }

        .button {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            text-decoration: none;
            color: var(--text-color);
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 5px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--background-color);
            padding: 2rem;
            border-radius: 10px;
            z-index: 1000;
            max-width: 80%;
            max-height: 80%;
            overflow-y: auto;
            display: none;
            backdrop-filter: blur(10px);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.5rem;
            cursor: pointer;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--text-color);
            border-top: 3px solid #333;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="spinner"></div>
    </div>
    <video id="bg-video" autoplay loop muted playsinline>
        <source src="bg_video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="overlay"></div>
    <div class="container">
        <h1>Slymi's Portfolio</h1>
        <div class="button-container">
            <a href="#about-content" class="button" id="about-btn" style="animation-delay: 0.2s;" aria-label="Learn more about Slymi">About Me</a>
            <a href="https://pathmaker.slymi.org/" class="button" target="_blank" style="animation-delay: 0.4s;">PathMaker</a>
            <a href="https://github.com/CuzImSlymi/" class="button" target="_blank" style="animation-delay: 0.6s;">My Github</a>
            <a href="#guides" class="button" id="guides-btn" style="animation-delay: 0.8s;">BSS Guides</a>
            <a href="https://discordapp.com/users/489797963481219087" class="button" target="_blank" style="animation-delay: 1s;">Contact</a>
        </div>
    </div>
    <div id="content">
        <span class="close-btn">&times;</span>
        <div id="content-inner"></div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.getElementById('bg-video');
            const preloader = document.getElementById('preloader');

            video.addEventListener('canplay', function() {
                preloader.style.display = 'none';
                video.style.opacity = '1';
            });

            document.getElementById('about-btn').addEventListener('click', function() {
                showContent('About Me', `
                    <div id="about-content">
                        <h2>About Me</h2>
                        <p>Hey! I'm Slymi, a developer always eager to learn and grow.</p>
                        <h3>My current expertise</h3>
                        <ul>
                            <li>AutoHotkey v2 macros</li>
                            <li>Web development</li>
                            <li>Image Processing and Large Language Model AI basics</li>
                            <li>Redstone game development</li>
                        </ul>
                        <h3>Current Focus</h3>
                        <ul>
                            <li>PHP for backend development</li>
                            <li>Expanding skills in AHK v2, Python, and HTML</li>
                            <li>Exploring various programming languages</li>
                        </ul>
                        <h3>Beyond Coding</h3>
                        <ul>
                            <li>Learning piano</li>
                            <li>Studying Japanese</li>
                            <li>Reading: Currently "48 Laws of Power"</li>
                        </ul>
                        <p>I believe the worst thing you could possibly do is give up on trying in everything that you are able to do. throwing away the potential because you tell yourself you can't. Giving up too easily and ending up regretting it.. even if nothing you do feels right, someday it will.</p>
                    </div>
                `);
            });

            document.querySelector('.close-btn').addEventListener('click', function() {
                document.getElementById('content').style.display = 'none';
            });

            function showContent(title, content) {
                const contentDiv = document.getElementById('content');
                const innerContent = document.getElementById('content-inner');
                innerContent.innerHTML = `<h2>${title}</h2>${content}`;
                contentDiv.style.display = 'block';
            }

            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    document.querySelector(this.getAttribute('href')).scrollIntoView({
                        behavior: 'smooth'
                    });
                });
            });
        });
    </script>
</body>
</html>
